<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的全屏相册（高级版）</title>
    <style>
        /* ==============================
           CSS：负责网页的长相和布局
           ============================== */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 禁止出现滚动条 */
            background-color: black;
            font-family: Arial, sans-serif;
        }

        /* 整个相册的应用容器 */
        #app {
            position: relative;
            width: 100%;
            height: 100vh; /* 使用视口高度，确保手机上也是全屏 */
        }

        /* 共同的图片图层样式（用于实现淡入淡出） */
        .image-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover; /* 照片充满整个屏幕 */
            background-position: center center; /* 照片最中间填满屏幕，完美适配手机 */
            transition: opacity 1s ease-in-out; /* 关键：1秒的淡入淡出动画 */
        }

        /* 初始状态：第一层可见，第二层隐藏 */
        #image-container1 { z-index: 1; opacity: 1; }
        #image-container2 { z-index: 2; opacity: 0; }

        /* 箭头遮罩层（放在图片上面，覆盖整个区域） */
        #arrow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between; /* 左右两边对齐 */
            align-items: center; /* 垂直居中 */
            z-index: 10; /* 确保在图片上方 */
            pointer-events: none; /* 防止这个大容器遮挡图片层，只有它的子元素可点击 */
        }

        /* 箭头的基本样式 */
        .arrow {
            pointer-events: auto; /* 只有箭头本身是可点击的 */
            width: 100px; /* 增加点击区域 */
            height: 100%; /* 覆盖整个高度，方便触摸 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3); /* 初始：半透明白色 */
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s; /* 颜色变化动画 */
        }

        /* 桌面电脑上：鼠标悬停（Hover）到箭头时的样式 */
        .arrow:hover {
            color: rgba(255, 255, 255, 0.8); /* 悬停时变清晰，突出显示箭头本身 */
            background-color: transparent; /* 移除之前的 hover 区域背景 */
        }

        /* 针对手机浏览器的适配调整 */
        @media (max-width: 768px) {
            /* 手机上稍微减小点击区域和字体大小，以适应小屏幕 */
            .arrow {
                width: 80px; 
                color: rgba(255, 255, 255, 0.7); /* 手机上始终保持清晰的半透明白色，因为没有 hover */
                font-size: 40px; 
            }
            /* 手机上移除 hover 效果，保持固定颜色 */
            .arrow:hover {
                color: rgba(255, 255, 255, 0.7); 
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="image-container1" class="image-layer"></div>
        <div id="image-container2" class="image-layer"></div>

        <div id="arrow-overlay">
            <div class="arrow left-arrow" onclick="prevImg()"> < </div>
            <div class="arrow right-arrow" onclick="nextImg()"> > </div>
        </div>
    </div>

    <script>
        /* ==============================
           JavaScript：负责网页的动作核心逻辑
           ============================== */
        
        // 1. 这里填入你的图片文件名
        const images = ['1.jpg', '2.jpg', '3.jpg']; 
        let currentIndex = 0;
        let isTransitioning = false; // 用于防止快速点击导致混乱

        const container1 = document.getElementById('image-container1');
        const container2 = document.getElementById('image-container2');
        
        // 记录当前显示的是哪一层，以及哪一层准备淡入
        let currentLayer = container1;
        let nextLayer = container2;

        // 初始化显示第一张图
        function initialize() {
            container1.style.backgroundImage = `url('${images[currentIndex]}')`;
            container1.style.opacity = 1;
            container2.style.opacity = 0;
        }
        initialize();

        // 核心：切换图片的逻辑（实现了两层淡入淡出）
        function changeImage(newIndex) {
            if (isTransitioning) return; // 如果正在动画中，则直接返回
            isTransitioning = true;

            const newImage = images[newIndex];

            // 1. 将新图片加载到“准备淡入的图层”（下一层）
            nextLayer.style.backgroundImage = `url('${newImage}')`;

            // 2. 开始 CSS 淡入淡出动画：当前层变透明，下一层变可见
            currentLayer.style.opacity = 0;
            nextLayer.style.opacity = 1;

            // 3. 在 CSS transition 动画完成后，交换层引用
            currentLayer.ontransitionend = () => {
                // 移除旧事件监听器以防止多重触发
                currentLayer.ontransitionend = null; 

                // 交换层引用：当前层变成下一层，下一层变成当前层
                const temp = currentLayer;
                currentLayer = nextLayer;
                nextLayer = temp;

                isTransitioning = false; // 允许进行下一次切换
            };
        }

        // 下一张
        function nextImg() {
            currentIndex = (currentIndex + 1) % images.length;
            changeImage(currentIndex);
        }

        // 上一张
        function prevImg() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            changeImage(currentIndex);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuoTuo's Dimension</title>
    
    <link rel="icon" href="logo.png?v=2" type="image/png">
    
    <style>
        /* 1. 核心修复：强制重置所有元素的边距，彻底消除黑框 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            /* 修正后的粉色磨砂指针：点击热点在中心 (16 16) */
            cursor: url('data:image/svg+xml;utf8,%3Csvg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"%3E%3Cdefs%3E%3CradialGradient id="g" cx="40%" cy="40%" r="60%"%3E%3Cstop offset="0%" stop-color="%23fff" stop-opacity="0.2"/%3E%3Cstop offset="100%" stop-color="%23FFB6C1" stop-opacity="0.6"/%3E%3C/radialGradient%3E%3C/defs%3E%3Cpath fill="url(%23g)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/%3E%3C/svg%3E') 16 16, auto;
        }

        /* 磨砂爱心拖尾 */
        .heart-trail {
            position: fixed; pointer-events: none; z-index: 9999;
            background-image: url('data:image/svg+xml;utf8,%3Csvg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"%3E%3Cdefs%3E%3CradialGradient id="g" cx="40%" cy="40%" r="60%"%3E%3Cstop offset="0%" stop-color="%23fff" stop-opacity="0.2"/%3E%3Cstop offset="100%" stop-color="%23FFB6C1" stop-opacity="0.6"/%3E%3C/radialGradient%3E%3C/defs%3E%3Cpath fill="url(%23g)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/%3E%3C/svg%3E');
            background-size: cover; width: 18px; height: 18px;
            animation: fadeOutHeart 1.2s forwards;
        }

        @keyframes fadeOutHeart {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(1.4); opacity: 0; }
        }

        #app { position: relative; width: 100%; height: 100vh; overflow: hidden; }

        .image-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            transition: opacity 1.2s ease-in-out; opacity: 0; 
        }

        /* 导航点样式 */
        .dots-container {
            position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
            z-index: 35; display: flex; gap: 12px;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer; transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dot.active { background: #fff; transform: scale(1.3); box-shadow: 0 0 8px #fff; }

        .main-card {
            position: absolute; bottom: 30px; left: 30px; z-index: 20;
            width: 220px; padding: 15px; background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; color: white;
        }
        h1 { margin: 0; font-size: 22px; font-weight: 400; }
        .quote { margin-top: 6px; font-size: 11px; opacity: 0.6; line-height: 1.4; }

        .music-player { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 40; background: rgba(0, 0, 0, 0.4); padding: 8px 15px; 
            border-radius: 30px; display: flex; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
        }
        #play-btn { width: 22px; height: 22px; border: none; background: #fff; border-radius: 50%; cursor: pointer; margin-right: 10px; font-size: 9px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="app">
        <div id="img1" class="image-layer"></div>
        <div id="img2" class="image-layer"></div>

        <div class="dots-container">
            <div class="dot" onclick="goTo(0)"></div>
            <div class="dot" onclick="goTo(1)"></div>
            <div class="dot" onclick="goTo(2)"></div>
            <div class="dot" onclick="goTo(3)"></div>
            <div class="dot" onclick="goTo(4)"></div>
        </div>

        <div class="main-card">
            <h1>TuoTuo</h1>
            <div class="quote">生活原本沉闷，但跑起来就有风。</div>
        </div>

        <div class="music-player">
            <button id="play-btn">▶</button>
            <div class="music-info" style="color:white; font-size:11px">BGM</div>
            <audio id="bgm" src="bgm.mp3" loop></audio>
        </div>
    </div>

    <script>
        const images = ['1.webp', '2.webp', '3.webp', '4.webp', '5.webp']; 
        let idx = 0;
        const c1 = document.getElementById('img1'), c2 = document.getElementById('img2');
        let cur = c1, nxt = c2;
        let slideTimer;

        function updateDots(activeIdx) {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === activeIdx));
        }

        function sw() {
            nxt.style.backgroundImage = `url('${images[idx]}')`;
            cur.style.opacity = 0; 
            nxt.style.opacity = 1;
            updateDots(idx);
            
            setTimeout(() => {
                let t = cur; cur = nxt; nxt = t;
            }, 1200);
            
            idx = (idx + 1) % images.length;
        }

        function goTo(n) {
            clearInterval(slideTimer);
            idx = n;
            sw();
            slideTimer = setInterval(sw, 6000);
        }

        window.onload = function() {
            sw(); 
            slideTimer = setInterval(sw, 6000); 
        };

        const bgm = document.getElementById('bgm'), p = document.getElementById('play-btn');
        p.onclick = () => { 
            if(bgm.paused){ bgm.play(); p.innerText = '⏸'; } 
            else { bgm.pause(); p.innerText = '▶'; } 
        };

        document.addEventListener('mousemove', function(e) {
            if (Math.random() < 0.15) { 
                const heart = document.createElement('div');
                heart.className = 'heart-trail';
                const s = Math.random() * 10 + 10;
                heart.style.width = s + 'px';
                heart.style.height = s + 'px';
                heart.style.left = (e.pageX - s/2) + 'px';
                heart.style.top = (e.pageY - s/2) + 'px';
                heart.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1200);
            }
        });
    </script>
</body>
</html>

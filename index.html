<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuoTuo's Dimension</title>
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v2/dist/waline.css" />
    <link rel="icon" href="logo.png?v=2" type="image/png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; background-color: #FFF0F5; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            cursor: url('data:image/svg+xml;utf8,%3Csvg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"%3E%3Cdefs%3E%3CradialGradient id="g" cx="40%" cy="40%" r="60%"%3E%3Cstop offset="0%" stop-color="%23fff" stop-opacity="0.2"/%3E%3Cstop offset="100%" stop-color="%23FFB6C1" stop-opacity="0.6"/%3E%3C/radialGradient%3E%3C/defs%3E%3Cpath fill="url(%23g)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/%3E%3C/svg%3E') 16 16, auto;
        }

        .heart-trail { position: fixed; pointer-events: none; z-index: 9999; background-image: url('data:image/svg+xml;utf8,%3Csvg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"%3E%3Cdefs%3E%3CradialGradient id="g" cx="40%" cy="40%" r="60%"%3E%3Cstop offset="0%" stop-color="%23fff" stop-opacity="0.2"/%3E%3Cstop offset="100%" stop-color="%23FFB6C1" stop-opacity="0.6"/%3E%3C/radialGradient%3E%3C/defs%3E%3Cpath fill="url(%23g)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/%3E%3C/svg%3E'); background-size: cover; width: 18px; height: 18px; animation: fadeOutHeart 1.2s forwards; }
        @keyframes fadeOutHeart { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-40px) scale(1.4); opacity: 0; } }

        #app { position: relative; width: 100%; height: 100%; overflow: hidden; }
        
        .image-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: contain; 
            background-position: center; 
            background-repeat: no-repeat; 
            transition: opacity 1.2s ease-in-out; opacity: 0; 
        }

        /* ========================================= */
        /* --- 核心新增：磨砂边缘渐变融合层 --- */
        /* ========================================= */
        .frosted-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; /* 盖在图片之上，但在UI按钮之下 */
            pointer-events: none; /* 防止挡住点击操作 */
            
            /* 1. 磨砂玻璃模糊滤镜 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            /* 2. 遮罩层：控制哪里模糊。中心40%透明(不模糊)，边缘变黑(生效模糊) */
            -webkit-mask-image: radial-gradient(ellipse at center, transparent 40%, black 85%);
            mask-image: radial-gradient(ellipse at center, transparent 40%, black 85%);
            
            /* 3. 背景色：中心透明，边缘叠加淡粉色，完美吃掉生硬边界 */
            background: radial-gradient(ellipse at center, transparent 40%, #FFF0F5 90%);
        }

        .age-selector { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 35; display: flex; gap: 15px; }
        .age-btn { padding: 4px 16px; border-radius: 20px; background: rgba(255, 182, 193, 0.4); border: 1px solid rgba(255, 182, 193, 0.6); color: rgba(0, 0, 0, 0.6); font-size: 14px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s ease; }
        .age-btn:hover { background: rgba(255, 182, 193, 0.6); color: #000; }
        .age-btn.active { background: #FFB6C1; color: #fff; border-color: #FFB6C1; box-shadow: 0 0 12px rgba(255, 182, 193, 0.8); transform: scale(1.1); }

        .dots-container { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); z-index: 35; display: flex; gap: 12px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 182, 193, 0.5); cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255, 182, 193, 0.3); }
        .dot.active { background: #FFB6C1; transform: scale(1.3); box-shadow: 0 0 8px #FFB6C1; }

        .main-card { position: absolute; bottom: 30px; left: 30px; z-index: 20; width: 220px; padding: 15px; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 15px; color: #333; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2); }
        h1 { margin: 0; font-size: 22px; font-weight: bold; color: #FFB6C1; }
        .quote { margin-top: 6px; font-size: 11px; opacity: 0.8; line-height: 1.4; }

        .music-player { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 40; background: rgba(255, 255, 255, 0.3); padding: 8px 15px; border-radius: 30px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2); }
        #play-btn { width: 22px; height: 22px; border: none; background: #FFB6C1; border-radius: 50%; cursor: pointer; margin-right: 10px; font-size: 9px; display: flex; align-items: center; justify-content: center; color: white; }

        .comment-trigger { position: absolute; bottom: 30px; right: 30px; z-index: 50; width: 50px; height: 50px; background-color: rgba(255, 182, 193, 0.9); backdrop-filter: blur(5px); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255, 182, 193, 0.5); transition: all 0.3s ease; }
        .comment-trigger:hover { transform: scale(1.1) rotate(-10deg); }

        .comment-panel { position: absolute; bottom: 95px; right: 30px; z-index: 60; width: 350px; max-height: 500px; padding: 15px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 20px; color: #333; display: none; flex-direction: column; overflow-y: auto; box-shadow: 0 10px 40px rgba(255, 182, 193, 0.3); transition: all 0.3s ease; }
        :root { --waline-white: rgba(255,255,255,0.5); --waline-theme-color: #FFB6C1; --waline-color: #333; }
        .wl-panel { background: rgba(255,255,255,0.6) !important; border: 1px solid rgba(255,255,255,0.8) !important; }
        .wl-content { color: #333 !important; }

        @media (max-width: 768px) {
            .main-card { bottom: auto; top: 30px; left: 20px; width: 60%; padding: 12px; }
            .music-player { bottom: 30px; left: 20px; transform: none; }
            .comment-trigger { bottom: 30px; right: 20px; width: 45px; height: 45px; }
            .comment-panel { width: 90vw; right: 5vw; bottom: 90px; max-height: 60vh; }
            .dots-container { bottom: 90px; }
            .age-selector { bottom: 125px; gap: 10px; }
            .age-btn { padding: 4px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="img1" class="image-layer"></div>
        <div id="img2" class="image-layer"></div>
        
        <div class="frosted-overlay"></div>
        
        <div class="age-selector">
            <div class="age-btn active" data-age="22" onclick="switchAge(22)">22</div>
            <div class="age-btn" data-age="21" onclick="switchAge(21)">21</div>
            <div class="age-btn" data-age="20" onclick="switchAge(20)">20</div>
            <div class="age-btn" data-age="19" onclick="switchAge(19)">19</div>
        </div>

        <div class="dots-container" id="dynamic-dots"></div>
        
        <div class="main-card"><h1>TuoTuo</h1><div class="quote" style="color:#666;">生活原本沉闷，但跑起来就有风。</div></div>
        <div class="music-player"><button id="play-btn">▶</button><div class="music-info" style="color:#666; font-size:11px">BGM</div><audio id="bgm" src="bgm.mp3" loop></audio></div>

        <div class="comment-trigger" id="bunny-btn"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 7C9 3.5 10.5 2 11.5 2C12.5 2 13 4.5 13 7" stroke="white" stroke-width="1.5"/><path d="M12 7C12 3.5 13.5 2 14.5 2C15.5 2 16 4.5 16 7" stroke="white" stroke-width="1.5"/><circle cx="12.5" cy="13.5" r="6.5" stroke="white" stroke-width="1.5"/><circle cx="10" cy="13" r="0.8" fill="white"/><circle cx="15" cy="13" r="0.8" fill="white"/><path d="M11.5 15.5C12 16 13 16 13.5 15.5" stroke="white" stroke-width="1"/></svg></div>
        
        <div class="comment-panel" id="comment-panel">
            <h3 style="margin-bottom:10px; color:#FFB6C1; text-align:center;">💌 大家的留言</h3>
            <div id="waline"></div>
        </div>
    </div>

    <script src="https://unpkg.com/@waline/client@v2/dist/waline.js"></script>
    <script>
        const albums = {
            22: ['22-1.webp', '22-2.webp', '22-3.webp', '22-4.webp', '22-5.webp'],
            21: ['21-1.webp', '21-2.webp', '21-3.webp', '21-4.webp'],
            20: ['20-1.webp', '20-2.webp'],
            19: ['19-1.webp']
        };
        
        let currentAge = 22; 
        let currentImages = albums[currentAge]; 
        let idx = 0; 
        
        const c1 = document.getElementById('img1'), c2 = document.getElementById('img2');
        const dotsContainer = document.getElementById('dynamic-dots');
        let cur = c1, nxt = c2, slideTimer;

        function renderDots() {
            dotsContainer.innerHTML = ''; 
            if (currentImages.length <= 1) {
                dotsContainer.style.display = 'none';
            } else {
                dotsContainer.style.display = 'flex';
                for (let i = 0; i < currentImages.length; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.onclick = () => goTo(i);
                    dotsContainer.appendChild(dot);
                }
            }
        }

        function updateDots(activeIdx) { 
            const dots = document.querySelectorAll('.dot'); 
            if(dots.length > 0) {
                dots.forEach((d, i) => d.classList.toggle('active', i === activeIdx)); 
            }
        }

        function switchAge(age) {
            if(currentAge === age) return;
            currentAge = age; 
            currentImages = albums[age];
            document.querySelectorAll('.age-btn').forEach(btn => { btn.classList.toggle('active', parseInt(btn.dataset.age) === age); });
            
            clearInterval(slideTimer); 
            idx = 0; 
            renderDots(); 
            sw(); 
            
            if(currentImages.length > 1) {
                slideTimer = setInterval(sw, 6000);
            }
        }

        function sw() { 
            nxt.style.backgroundImage = `url('${currentImages[idx]}')`; 
            cur.style.opacity = 0; nxt.style.opacity = 1; 
            updateDots(idx); 
            setTimeout(() => { let t = cur; cur = nxt; nxt = t; }, 1200); 
            
            if(currentImages.length > 1) {
                idx = (idx + 1) % currentImages.length; 
            }
        }
        
        function goTo(n) { 
            clearInterval(slideTimer); idx = n; sw(); 
            if(currentImages.length > 1) {
                slideTimer = setInterval(sw, 6000); 
            }
        }
        
        window.onload = function() { 
            renderDots(); 
            sw(); 
            if(currentImages.length > 1) {
                slideTimer = setInterval(sw, 6000);
            }
        };
        
        const bgm = document.getElementById('bgm'), p = document.getElementById('play-btn');
        p.onclick = () => { if(bgm.paused){ bgm.play(); p.innerText = '⏸'; } else { bgm.pause(); p.innerText = '▶'; } };

        const isMobile = window.matchMedia("(max-width: 768px)").matches;
        if (!isMobile) {
            document.addEventListener('mousemove', function(e) {
                if (Math.random() < 0.15) { 
                    const heart = document.createElement('div'); heart.className = 'heart-trail';
                    const s = Math.random() * 10 + 10; heart.style.width = s + 'px'; heart.style.height = s + 'px';
                    heart.style.left = (e.pageX - s/2) + 'px'; heart.style.top = (e.pageY - s/2) + 'px';
                    heart.style.transform = `rotate(${Math.random() * 360}deg)`;
                    document.body.appendChild(heart); setTimeout(() => heart.remove(), 1200);
                }
            });
        }

        const bunnyBtn = document.getElementById('bunny-btn'), commentPanel = document.getElementById('comment-panel');
        bunnyBtn.onclick = (e) => { e.stopPropagation(); commentPanel.style.display = commentPanel.style.display === 'flex' ? 'none' : 'flex'; };
        document.addEventListener('click', (e) => { if (!commentPanel.contains(e.target) && e.target !== bunnyBtn) commentPanel.style.display = 'none'; });

        Waline.init({
            el: '#waline',
            serverURL: 'https://waline-test.your-domain.com', 
            dark: false, placeholder: '在这里留言吧...', wordLimit: 100, pageSize: 5, nickname: "TuoTuo's fans",
        });
    </script>
</body>
</html>

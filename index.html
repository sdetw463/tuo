<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuoTuo's World</title>
    <style>
        /* 基础样式：确保铺满全屏且无滚动条 */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            overflow: hidden; background-color: #000; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
        }

        #app { position: relative; width: 100%; height: 100vh; }

        /* 全屏背景图层：负责平滑的淡入淡出 */
        .image-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            transition: opacity 1.2s ease-in-out; opacity: 0; 
        }
        #img1 { z-index: 1; } 
        #img2 { z-index: 2; }

        /* 左下角 TuoTuo 卡片：极简透明、磨砂感 */
        .main-card {
            position: absolute; bottom: 30px; left: 30px; z-index: 20;
            width: 220px; padding: 15px; text-align: left;
            background: rgba(255, 255, 255, 0.05); /* 极低透明度 */
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 { margin: 0; font-size: 22px; font-weight: 400; letter-spacing: 1px; }
        .quote { margin-top: 6px; font-size: 11px; opacity: 0.6; line-height: 1.4; }

        /* 音乐播放器：居中底部，小巧精致 */
        .music-player { 
            position: absolute; bottom: 20px; left: 50%; 
            transform: translateX(-50%); z-index: 40; 
            background: rgba(0, 0, 0, 0.4); padding: 8px 15px; 
            border-radius: 30px; display: flex; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
        }
        #play-btn { 
            width: 22px; height: 22px; border: none; 
            background: #fff; border-radius: 50%; 
            cursor: pointer; margin-right: 10px; font-size: 9px; 
            display: flex; align-items: center; justify-content: center;
        }
        .music-info { color: white; font-size: 11px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="app">
        <div id="img1" class="image-layer"></div>
        <div id="img2" class="image-layer"></div>

        <div class="main-card">
            <h1>TuoTuo</h1>
            <div class="quote">生活原本沉闷，但跑起来就有风。</div>
        </div>

        <div class="music-player">
            <button id="play-btn">▶</button>
            <div class="music-info">BGM</div>
            <audio id="bgm" src="bgm.mp3" loop></audio>
        </div>
    </div>

    <script>
        // --- 1. 背景轮播配置 ---
        const images = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg'];
        let idx = 0;
        const c1 = document.getElementById('img1'), c2 = document.getElementById('img2');
        let cur = c1, nxt = c2;

        function sw() {
            // 设置下一张图的背景
            nxt.style.backgroundImage = `url('${images[idx]}')`;
            // 执行淡入淡出动画：旧的变透明，新的变清晰
            cur.style.opacity = 0; 
            nxt.style.opacity = 1;
            
            // 动画完成后交换图层引用
            setTimeout(() => { 
                let t = cur; cur = nxt; nxt = t; 
            }, 1200);
            
            idx = (idx + 1) % images.length;
        }

        // 页面加载完成后立即启动轮播
        window.onload = function() {
            sw(); // 立即显示第一张
            setInterval(sw, 6000); // 每6秒自动切换
        };

        // --- 2. 音乐播放逻辑 ---
        const bgm = document.getElementById('bgm'), p = document.getElementById('play-btn');
        p.onclick = () => { 
            if(bgm.paused){ 
                bgm.play(); p.innerText = '⏸'; 
            } else { 
                bgm.pause(); p.innerText = '▶'; 
            } 
        };
    </script>
</body>
</html>

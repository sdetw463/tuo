<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMI Style Album (TuoTuo Ed.)</title>
    <style>
        /* 1. 基础样式 (保持原样) */
        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        #app { position: relative; width: 100%; height: 100vh; }

        /* 2. 全屏背景层 (保持原样) */
        .image-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 1.2s ease-in-out; opacity: 0;
        }
        #img1 { z-index: 1; }
        #img2 { z-index: 2; }

        /* 3. 修改：中央卡片 -> 左下角卡片 */
        .main-card {
            position: absolute;
            /* ======= 修改：从中间移至左下角 ======= */
            bottom: 20px; /* 距离底部 20px */
            left: 20px; /* 距离左侧 20px */
            transform: none; /* 移除之前的居中偏移 */
            /* ======================================= */
            z-index: 20;
            width: 85%; max-width: 400px;
            padding: 20px; /* 减小一点 padding，更紧凑 */
            text-align: left; /* 文字改为左对齐 */
            /* ======= 修改：增加透明度，降低模糊 ======= */
            background: rgba(255, 255, 255, 0.08); /* 更加透明 (从 0.15 降到 0.08) */
            backdrop-filter: blur(5px); /* 降低模糊度 (从 15px 降到 5px) */
            -webkit-backdrop-filter: blur(5px);
            /* ======================================= */
            border: 1px solid rgba(255, 255, 255, 0.15); /* 边框也淡一点 */
            border-radius: 16px; /* 圆角小一点 */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            color: white;
        }

        h1 { margin: 10px 0; font-size: 22px; font-weight: 300; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 13px; opacity: 0.8; line-height: 1.6; }

        /* 4. 左右切换箭头 (保持原样) */
        .arrow {
            position: absolute; top: 0; width: 15%; height: 100%;
            z-index: 30; display: flex; align-items: center; justify-content: center;
            color: rgba(255, 255, 255, 0.2); font-size: 40px;
            cursor: pointer; transition: 0.3s; pointer-events: auto;
        }
        .arrow:hover { color: rgba(255, 255, 255, 0.7); background: rgba(255,255,255,0.05); }
        .left-arrow { left: 0; }
        .right-arrow { right: 0; }

        /* 5. 音乐播放器插件样式 (保持原样) */
        .music-player {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex; align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #play-btn {
            width: 25px; height: 25px;
            border: none; background: white;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-right: 10px; font-size: 12px;
        }
        .music-info { color: white; font-size: 11px; white-space: nowrap; }

        /* 移动端微调 */
        @media (max-width: 768px) {
            .main-card { 
                width: 70%; 
                padding: 15px; 
                bottom: 10px; /* 手机上距离更小 */
                left: 10px;
            }
            .arrow { width: 20%; font-size: 30px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="img1" class="image-layer"></div>
        <div id="img2" class="image-layer"></div>

        <div class="arrow left-arrow" onclick="prevImg()"> < </div>
        <div class="arrow right-arrow" onclick="nextImg()"> > </div>

        <div class="main-card">
            <h1>TuoTuo</h1>
            <p>生活原本沉闷，但跑起来就有风。</p>
            <p style="margin-top: 10px; font-size: 11px; opacity: 0.5;">Slide to explore</p>
        </div>

        <div class="music-player">
            <button id="play-btn">▶</button>
            <div class="music-info">Background Music</div>
            <audio id="bgm" src="bgm.mp3" loop></audio>
        </div>
    </div>

    <script>
        // 图片逻辑 (保持原样，假设你已有 1.jpg, 2.jpg 等)
        const images = ['1.jpg', '2.jpg', '3.jpg', '4.jpg']; 
        let currentIndex = 0;
        let isTransitioning = false;

        const container1 = document.getElementById('img1');
        const container2 = document.getElementById('img2');
        let currentLayer = container1;
        let nextLayer = container2;

        function init() {
            currentLayer.style.backgroundImage = `url('${images[currentIndex]}')`;
            currentLayer.style.opacity = 1;
        }
        init();

        function changeImage(newIndex) {
            if (isTransitioning) return;
            isTransitioning = true;
            nextLayer.style.backgroundImage = `url('${images[newIndex]}')`;
            currentLayer.style.opacity = 0;
            nextLayer.style.opacity = 1;
            
            setTimeout(() => {
                let temp = currentLayer;
                currentLayer = nextLayer;
                nextLayer = temp;
                isTransitioning = false;
            }, 1200);
        }

        function nextImg() { currentIndex = (currentIndex + 1) % images.length; changeImage(currentIndex); }
        function prevImg() { currentIndex = (currentIndex - 1 + images.length) % images.length; changeImage(currentIndex); }

        // 音乐控制逻辑 (保持原样)
        const bgm = document.getElementById('bgm');
        const playBtn = document.getElementById('play-btn');
        let isPlaying = false;

        playBtn.onclick = function() {
            if (isPlaying) {
                bgm.pause();
                playBtn.innerText = '▶';
            } else {
                bgm.play();
                playBtn.innerText = '⏸';
            }
            isPlaying = !isPlaying;
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuoTuo's Dimension</title>
    
    <link rel="icon" href="logo.png?v=2" type="image/png">
    
    <style>
        /* 基础样式：确保铺满全屏且无滚动条 */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            overflow: hidden; background-color: #000; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 

/* 使用 Base64 编码的粉色爱心 SVG 作为指针 */
    cursor: url('data:image/svg+xml;utf8,%3Csvg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"%3E%3Cdefs%3E%3CradialGradient id="g" cx="40%" cy="40%" r="60%"%3E%3Cstop offset="0%" stop-color="%23fff" stop-opacity="0.2"/%3E%3Cstop offset="100%" stop-color="%23FFB6C1" stop-opacity="0.6"/%3E%3C/radialGradient%3E%3C/defs%3E%3Cpath fill="url(%23g)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/%3E%3C/svg%3E'), auto;
}

/* 爱心拖尾的样式 */
.heart-trail {
    position: fixed;
    pointer-events: none; /* 确保爱心不会挡住点击 */
    color: #FFB6C1; /* 粉红色 */
    font-size: 15px;
    z-index: 9999;
    animation: fadeOutHeart 1.2s forwards;
    user-select: none;
}

@keyframes fadeOutHeart {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
}

/* 爱心拖尾的样式 */
.heart-trail {
    position: fixed;
    pointer-events: none; /* 确保爱心不会挡住点击 */
    color: #FFB6C1; /* 粉红色 */
    font-size: 15px;
    z-index: 9999;
    animation: fadeOutHeart 1.2s forwards;
    user-select: none;
        }


        #app { position: relative; width: 100%; height: 100vh; }

        /* 全屏背景图层：负责平滑的淡入淡出 */
        .image-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            transition: opacity 1.2s ease-in-out; opacity: 0; 
        }
        #img1 { z-index: 1; } 
        #img2 { z-index: 2; }

        /* 左下角 TuoTuo 卡片：极简透明、磨砂感 */
        .main-card {
            position: absolute; bottom: 30px; left: 30px; z-index: 20;
            width: 220px; padding: 15px; text-align: left;
            background: rgba(255, 255, 255, 0.05); /* 极低透明度 */
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 { margin: 0; font-size: 22px; font-weight: 400; letter-spacing: 1px; }
        .quote { margin-top: 6px; font-size: 11px; opacity: 0.6; line-height: 1.4; }

        /* 音乐播放器：居中底部，小巧精致 */
        .music-player { 
            position: absolute; bottom: 20px; left: 50%; 
            transform: translateX(-50%); z-index: 40; 
            background: rgba(0, 0, 0, 0.4); padding: 8px 15px; 
            border-radius: 30px; display: flex; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
        }
        #play-btn { 
            width: 22px; height: 22px; border: none; 
            background: #fff; border-radius: 50%; 
            cursor: pointer; margin-right: 10px; font-size: 9px; 
            display: flex; align-items: center; justify-content: center;
        }
        .music-info { color: white; font-size: 11px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="app">
        <div id="img1" class="image-layer"></div>
        <div id="img2" class="image-layer"></div>

        <div class="main-card">
            <h1>TuoTuo</h1>
            <div class="quote">生活原本沉闷，但跑起来就有风。</div>
        </div>

        <div class="music-player">
            <button id="play-btn">▶</button>
            <div class="music-info">BGM</div>
            <audio id="bgm" src="bgm.mp3" loop></audio>
        </div>
    </div>

    <script>
        // --- 1. 背景轮播配置 ---
        const images = ['1.webp', '2.webp', '3.webp', '4.webp', '5.webp']; 
        let idx = 0;
        const c1 = document.getElementById('img1'), c2 = document.getElementById('img2');
        let cur = c1, nxt = c2;

        function sw() {
    const imgUrl = images[idx];
    const tempImg = new Image();
    
    // 先在后台悄悄下载图片
    tempImg.src = imgUrl;
    
    tempImg.onload = function() {
        // 只有图片下载完了，才执行切换动画
        nxt.style.backgroundImage = `url('${imgUrl}')`;
        cur.style.opacity = 0;
        nxt.style.opacity = 1;
        
        setTimeout(() => {
            let t = cur; cur = nxt; nxt = t;
        }, 1200);
        
        idx = (idx + 1) % images.length;
    };
}

            
            // 动画完成后交换图层引用
            setTimeout(() => { 
                let t = cur; cur = nxt; nxt = t; 
            }, 1200);
            
            idx = (idx + 1) % images.length;
        }

        // 页面加载完成后立即启动轮播
        window.onload = function() {
            sw(); // 立即显示第一张
            setInterval(sw, 6000); // 每6秒自动切换
        };

        // --- 2. 音乐播放逻辑 ---
        const bgm = document.getElementById('bgm'), p = document.getElementById('play-btn');
        p.onclick = () => { 
            if(bgm.paused){ 
                bgm.play(); p.innerText = '⏸'; 
            } else { 
                bgm.pause(); p.innerText = '▶'; 
            } 
        };

// --- 爱心拖尾特效 ---
document.addEventListener('mousemove', function(e) {
    if (Math.random() < 0.15) { 
        createHeart(e.pageX, e.pageY);
    }
});

function createHeart(x, y) {
    const heart = document.createElement('div');
    heart.className = 'heart-trail';
    heart.innerHTML = '❤';
    
    const size = Math.random() * 10 + 10 + 'px';
    heart.style.fontSize = size;
    heart.style.left = x + 'px';
    heart.style.top = y + 'px';
    
    heart.style.transform = `rotate(${Math.random() * 360}deg)`;
    
    document.body.appendChild(heart);
    
    setTimeout(() => {
        heart.remove();
    }, 1200);
}
    </script>
</body>
</html>
